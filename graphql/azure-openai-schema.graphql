  stream: Boolean
  stop: [String!]
  presencePenalty: Float
  frequencyPenalty: Float
  logitBias: JSON
  logprobs: Boolean
  topLogprobs: Int
  user: String
  tools: [ToolDefinitionInput!]
  toolChoice: JSON
  parallelToolCalls: Boolean
  responseFormat: ResponseFormatInput
  seed: Int
  functions: [FunctionDefinitionInput!]
  functionCall: JSON
  dataSources: [DataSourceInput!]
  enhancements: EnhancementsInput
}

input ChatMessageInput {
  role: ChatRole!
  content: String
  name: String
  toolCallId: String
  toolCalls: [ToolCallInput!]
  functionCall: FunctionCallInput
}

input ToolCallInput {
  id: ID!
  type: ToolType!
  function: FunctionCallInfoInput!
}

input FunctionCallInfoInput {
