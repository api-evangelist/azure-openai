# -----------------------------------------------------------------------
# Query root
# -----------------------------------------------------------------------

type Query {
  """List all available models."""
  models(first: Int, after: String, last: Int, before: String): ModelConnection!

  """Get a specific model by ID."""
  model(id: ID!): Model

  """List deployments for the current resource."""
  deployments(first: Int, after: String): DeploymentConnection!

  """Get a specific deployment by name."""
  deployment(name: String!): Deployment

  """List files uploaded to the account."""
  files(
    purpose: FilePurpose
    first: Int
    after: String
  ): FileConnection!

  """Get a specific file by ID."""
  file(id: ID!): File

  """Retrieve the content of a file."""
  fileContent(id: ID!): FileContent

  """List fine-tuning jobs."""
  fineTuningJobs(
    after: String
    limit: Int
  ): FineTuningJobConnection!

  """Get a specific fine-tuning job."""
  fineTuningJob(id: ID!): FineTuningJob

  """List events for a fine-tuning job."""
  fineTuningJobEvents(
    jobId: ID!
    after: String
    limit: Int
  ): FineTuningEventConnection!

  """List checkpoints for a fine-tuning job."""
  fineTuningJobCheckpoints(
    jobId: ID!
    after: String
    limit: Int
  ): [FineTuningCheckpoint!]!

  """List batch jobs."""
  batches(after: String, limit: Int): BatchConnection!

  """Get a specific batch job."""
  batch(id: ID!): Batch
}

# -----------------------------------------------------------------------
# Mutation root
# -----------------------------------------------------------------------

type Mutation {
  """Create a chat completion."""
  createChatCompletion(input: ChatCompletionInput!): ChatCompletion!

  """Create a legacy text completion."""
  createCompletion(input: CompletionInput!): Completion!

  """Create text embeddings."""
  createEmbedding(input: EmbeddingInput!): EmbeddingResponse!

  """Generate an image using DALL-E."""
  generateImage(input: ImageGenerationInput!): ImageGenerationResponse!

  """Edit an existing image."""
  editImage(input: ImageEditInput!): ImageGenerationResponse!

  """Create variations of an image."""
  createImageVariation(input: ImageVariationInput!): ImageGenerationResponse!

  """Transcribe audio to text."""
  transcribeAudio(input: AudioTranscriptionInput!): AudioTranscription!

  """Translate audio to English text."""
  translateAudio(input: AudioTranslationInput!): AudioTranslation!

  """Generate speech audio from text."""
  generateSpeech(input: SpeechInput!): SpeechResponse!

  """Upload a file for fine-tuning or batch."""
  uploadFile(file: Upload!, purpose: FilePurpose!): File!

  """Delete a file."""
  deleteFile(id: ID!): Boolean!

  """Create a fine-tuning job."""
  createFineTuningJob(input: CreateFineTuningJobInput!): FineTuningJob!

  """Cancel a fine-tuning job."""
  cancelFineTuningJob(id: ID!): FineTuningJob!

  """Create a batch processing job."""
  createBatch(input: CreateBatchInput!): Batch!

  """Cancel a batch processing job."""
  cancelBatch(id: ID!): Batch!

  """Create a new model deployment."""
  createDeployment(input: CreateDeploymentInput!): Deployment!

  """Update an existing deployment."""
  updateDeployment(name: String!, input: UpdateDeploymentInput!): Deployment!

  """Delete a deployment."""
  deleteDeployment(name: String!): Boolean!
}

# -----------------------------------------------------------------------
# Subscription root
# -----------------------------------------------------------------------

type Subscription {
  """Stream chat completion chunks in real time."""
  chatCompletionStream(input: ChatCompletionInput!): ChatCompletionChunk!

  """Stream fine-tuning job events as they are emitted."""
  fineTuningJobEvents(jobId: ID!): FineTuningEvent!

  """Watch deployment status changes."""
  deploymentStatusChanged(name: String!): Deployment!

  """Watch batch job status changes."""
  batchStatusChanged(id: ID!): Batch!
}
