    # ----------------------------------------------------------------------
    # Chat Completions SSE chunk
    # ----------------------------------------------------------------------
    CreateChatCompletionStreamResponse:
      type: object
      description: |
        A streamed chunk of an Azure OpenAI chat completion response, delivered
        as the JSON `data:` payload of each SSE event. Mirrors the
        `createChatCompletionStreamResponse` schema in the Azure OpenAI data-plane
        OpenAPI definition.
      required:
        - id
        - choices
        - created
        - model
        - object
      properties:
        id:
          type: string
          description: A unique identifier for the chat completion. Each chunk has the same ID.
        choices:
          type: array
          items:
            type: object
            required:
              - delta
              - finish_reason
              - index
            properties:
              delta:
                $ref: '#/components/schemas/ChatCompletionStreamResponseDelta'
              logprobs:
                type: object
                nullable: true
              finish_reason:
                type: string
                nullable: true
                enum:
                  - stop
                  - length
                  - tool_calls
                  - content_filter
                  - function_call
              index:
                type: integer
              content_filter_results:
                type: object
                description: Azure-only per-choice content-filter result block.
        created:
          type: integer
          description: Unix timestamp (seconds) for the chunk. Same for every chunk in the stream.
        model:
          type: string
          description: The model that generated the completion.
        system_fingerprint:
          type: string
          description: Backend configuration fingerprint.
        object:
          type: string
          enum:
            - chat.completion.chunk
        usage:
          type: object
          nullable: true
          description: Usage statistics; populated on the final chunk when `stream_options.include_usage = true`.
          properties:
            prompt_tokens:
              type: integer
            completion_tokens:
              type: integer
            total_tokens:
              type: integer
        prompt_filter_results:
          type: array
          description: Azure-only content-filter results for the input prompts.
          items:
            type: object

    ChatCompletionStreamResponseDelta:
      type: object
      description: An incremental delta on a streamed chat completion.
      properties:
        content:
          type: string
          nullable: true
          description: The contents of the chunk message.
        function_call:
          type: object
          deprecated: true
          description: Deprecated; replaced by `tool_calls`.
          properties:
            arguments:
              type: string
            name:
              type: string
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ChatCompletionMessageToolCallChunk'
        role:
          type: string
          enum:
            - system
            - user
            - assistant
            - tool
        refusal:
          type: string
          nullable: true

    ChatCompletionMessageToolCallChunk:
      type: object
      properties:
        index:
          type: integer
        id:
          type: string
        type:
          type: string
          enum:
            - function
        function:
          type: object
          properties:
            name:
              type: string
            arguments:
              type: string
